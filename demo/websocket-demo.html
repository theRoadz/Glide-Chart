<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlideChart — WebSocket Data Feed Demo</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --text: #e0e0e0;
      --text-muted: #8a8a9a;
      --btn-bg: #1a1a2e;
      --btn-text: #e0e0e0;
      --btn-border: #3a3a4a;
      --btn-hover: #2a2a3e;
      --accent: #00d4aa;
      --red: #ff4466;
      --yellow: #ffaa00;
      --green: #00d4aa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 16px 24px 8px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
    }

    .header .subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    .controls {
      padding: 8px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      padding: 6px 16px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: 1px solid var(--btn-border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }

    button:hover { background: var(--btn-hover); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .status-bar {
      padding: 4px 24px;
      display: flex;
      gap: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-indicator.disconnected { background: var(--red); }
    .status-indicator.connecting { background: var(--yellow); }
    .status-indicator.connected { background: var(--green); }

    .chart-area {
      flex: 1;
      padding: 8px 24px 16px;
      min-height: 0;
    }

    .chart-container {
      width: 100%;
      height: 100%;
      background: var(--surface);
      border-radius: 8px;
      position: relative;
    }

    .log {
      max-height: 100px;
      overflow-y: auto;
      padding: 8px 24px;
      font-size: 11px;
      font-family: monospace;
      color: var(--text-muted);
    }

    .log div { padding: 1px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>WebSocket Data Feed</h1>
    <span class="subtitle">Simulated WebSocket with mock data (Story 3.3)</span>
  </div>

  <div class="controls">
    <button id="btn-connect">Connect</button>
    <button id="btn-disconnect" disabled>Disconnect</button>
    <button id="btn-burst">Inject Burst (20 pts)</button>
    <button id="btn-pause">Pause Feed</button>
    <button id="btn-reconnect-test">Test Reconnect</button>
  </div>

  <div class="status-bar">
    <span>
      <span id="status-dot" class="status-indicator disconnected"></span>
      <span id="status-text">Disconnected</span>
    </span>
    <span>Points: <span id="point-count">0</span></span>
    <span>Messages/s: <span id="msg-rate">0</span></span>
    <span>Stale: <span id="stale-status" style="color: var(--green)">Fresh</span></span>
  </div>

  <div class="chart-area">
    <div id="chart" class="chart-container"></div>
  </div>

  <div id="log" class="log"></div>

  <script type="module">
    import { GlideChart, WebSocketDataSource } from '../dist/index.js';

    // --- Mock WebSocket Server (simulates via setInterval) ---
    class MockWebSocketServer {
      constructor() {
        this.connections = new Set();
        this.interval = null;
        this.price = 100;
        this.tick = 0;
      }

      createConnection(url) {
        const conn = new MockConnection(url, this);
        this.connections.add(conn);
        return conn;
      }

      start() {
        if (this.interval) return;
        this.interval = setInterval(() => {
          this.tick++;
          // Random walk price
          this.price += (Math.random() - 0.48) * 0.5;
          this.price = Math.max(50, Math.min(200, this.price));
          const msg = JSON.stringify({
            timestamp: Date.now(),
            value: this.price,
          });
          for (const conn of this.connections) {
            if (conn.readyState === WebSocket.OPEN) {
              conn.dispatchMessage(msg);
            }
          }
        }, 400);
      }

      stop() {
        if (this.interval) {
          clearInterval(this.interval);
          this.interval = null;
        }
      }

      injectBurst(count) {
        for (let i = 0; i < count; i++) {
          this.price += (Math.random() - 0.5) * 2;
          this.price = Math.max(50, Math.min(200, this.price));
          const msg = JSON.stringify({
            timestamp: Date.now() + i,
            value: this.price,
          });
          for (const conn of this.connections) {
            if (conn.readyState === WebSocket.OPEN) {
              conn.dispatchMessage(msg);
            }
          }
        }
      }

      removeConnection(conn) {
        this.connections.delete(conn);
        if (this.connections.size === 0) {
          this.stop();
        }
      }
    }

    class MockConnection {
      static CONNECTING = 0;
      static OPEN = 1;
      static CLOSING = 2;
      static CLOSED = 3;

      constructor(url, server) {
        this.url = url;
        this.server = server;
        this.readyState = MockConnection.CONNECTING;
        this.onopen = null;
        this.onmessage = null;
        this.onclose = null;
        this.onerror = null;

        // Simulate async open
        setTimeout(() => {
          if (this.readyState === MockConnection.CONNECTING) {
            this.readyState = MockConnection.OPEN;
            if (this.onopen) this.onopen(new Event('open'));
            server.start();
          }
        }, 50);
      }

      dispatchMessage(data) {
        if (this.readyState === MockConnection.OPEN && this.onmessage) {
          this.onmessage(new MessageEvent('message', { data }));
        }
      }

      close() {
        this.readyState = MockConnection.CLOSED;
        this.server.removeConnection(this);
        if (this.onclose) this.onclose(new CloseEvent('close', { code: 1000 }));
      }

      simulateError() {
        if (this.onerror) this.onerror(new Event('error'));
        this.close();
      }
    }

    // --- Stub globalThis.WebSocket with our mock ---
    const mockServer = new MockWebSocketServer();
    const OriginalWebSocket = globalThis.WebSocket;

    globalThis.WebSocket = function(url) {
      return mockServer.createConnection(url);
    };
    globalThis.WebSocket.CONNECTING = 0;
    globalThis.WebSocket.OPEN = 1;
    globalThis.WebSocket.CLOSING = 2;
    globalThis.WebSocket.CLOSED = 3;

    // --- Chart setup ---
    const container = document.getElementById('chart');
    const staleStatusEl = document.getElementById('stale-status');
    const chart = new GlideChart(container, {
      series: [{ id: 'price', color: '#00d4aa' }],
      timeWindow: 30,
      staleThreshold: 5000,
      animation: { enabled: true, duration: 300 },
      onStaleChange: (event) => {
        if (event.isStale) {
          staleStatusEl.textContent = `Stale (${event.seriesId})`;
          staleStatusEl.style.color = 'var(--red)';
          log(`Stale: series "${event.seriesId}" — no data for >5s`);
        } else {
          staleStatusEl.textContent = 'Fresh';
          staleStatusEl.style.color = 'var(--green)';
          log(`Fresh: series "${event.seriesId}" — data resumed`);
        }
      },
    });

    // --- WebSocketDataSource ---
    let pointCount = 0;
    let msgCount = 0;
    let lastRateTime = Date.now();

    const ds = new WebSocketDataSource({
      chart,
      seriesId: 'price',
      messageParser: (data) => {
        const parsed = JSON.parse(data);
        return { timestamp: parsed.timestamp, value: parsed.value };
      },
      autoReconnect: true,
      reconnectDelay: 1000,
      maxReconnectDelay: 5000,
      onStateChange: (state) => {
        updateStatus(state);
        log(`State: ${state}`);
      },
      onError: (err) => {
        log(`Error: ${err.message}`);
      },
    });

    // --- UI ---
    const btnConnect = document.getElementById('btn-connect');
    const btnDisconnect = document.getElementById('btn-disconnect');
    const btnBurst = document.getElementById('btn-burst');
    const btnPause = document.getElementById('btn-pause');
    const btnReconnect = document.getElementById('btn-reconnect-test');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const pointCountEl = document.getElementById('point-count');
    const msgRateEl = document.getElementById('msg-rate');
    const logEl = document.getElementById('log');

    // Intercept addData to count points
    const origAddData = chart.addData.bind(chart);
    chart.addData = (seriesId, point) => {
      origAddData(seriesId, point);
      if (Array.isArray(point)) {
        pointCount += point.length;
        msgCount += point.length;
      } else {
        pointCount++;
        msgCount++;
      }
      pointCountEl.textContent = pointCount;
    };

    // Message rate counter
    setInterval(() => {
      const now = Date.now();
      const elapsed = (now - lastRateTime) / 1000;
      msgRateEl.textContent = elapsed > 0 ? (msgCount / elapsed).toFixed(1) : '0';
      msgCount = 0;
      lastRateTime = now;
    }, 1000);

    function updateStatus(state) {
      statusDot.className = `status-indicator ${state}`;
      statusText.textContent = state.charAt(0).toUpperCase() + state.slice(1);
      btnConnect.disabled = state !== 'disconnected';
      btnDisconnect.disabled = state === 'disconnected';
    }

    function log(msg) {
      const div = document.createElement('div');
      const time = new Date().toLocaleTimeString();
      div.textContent = `[${time}] ${msg}`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      // Keep log size manageable
      while (logEl.children.length > 50) {
        logEl.removeChild(logEl.firstChild);
      }
    }

    btnConnect.addEventListener('click', () => {
      ds.connect('ws://mock-pyth-hermes/price-feed');
      log('Connecting to mock WebSocket feed...');
    });

    btnDisconnect.addEventListener('click', () => {
      ds.disconnect();
      log('Disconnected');
    });

    btnBurst.addEventListener('click', () => {
      mockServer.injectBurst(20);
      log('Injected burst of 20 rapid data points');
    });

    let paused = false;
    btnPause.addEventListener('click', () => {
      paused = !paused;
      if (paused) {
        mockServer.stop();
        btnPause.textContent = 'Resume Feed';
        log('Feed paused — stale indicator should appear after 5s');
      } else {
        mockServer.start();
        btnPause.textContent = 'Pause Feed';
        log('Feed resumed');
      }
    });

    btnReconnect.addEventListener('click', () => {
      // Simulate a server-side disconnect to test auto-reconnect
      for (const conn of mockServer.connections) {
        conn.simulateError();
      }
      log('Simulated server disconnect — auto-reconnect should kick in');
    });

    log('Demo ready. Click "Connect" to start the simulated WebSocket feed.');
  </script>
</body>
</html>
